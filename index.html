function startCategory(cat){state.mode='quick';state.pool=shuffle(preguntas.filter(q=>q.categoria===cat)).slice(0,10);if(!state.pool.length) state.pool=shuffle(preguntas).slice(0,5);state.currentIndex=0;state.score=0;state.answered=[];showQuestion();}
function startGame(mode){state.mode=mode;state.pool=shuffle(preguntas).slice(0,mode==='expert'?50:10);state.currentIndex=0;state.score=0;state.answered=[];showQuestion();}
const currentQ=()=>state.pool[state.currentIndex];
function showQuestion(){const q=currentQ();if(!q) return showResults();setNav(state.mode==='expert'?'Modo experto':'Reto rápido',q.categoria);const p=Math.round((state.currentIndex/state.pool.length)*100);app.innerHTML=`<section class="screen"><div class="qtop"><div><div class="eyebrow blue">Pregunta ${state.currentIndex+1} de ${state.pool.length}</div><h2 class="qtitle">Cuestionario de Biodiversidad</h2></div><div style="display:flex;gap:10px;flex-wrap:wrap"><span class="pill">${q.categoria}</span><span class="pill">${q.nivel}</span></div></div><div class="progress"><div style="width:${p}%"></div></div><div class="qlayout card"><div><div class="qmark">?</div><h3 class="qtext">${q.pregunta}</h3><p class="qhelp">Selecciona la respuesta que consideres más correcta y suma puntos para avanzar en la misión.</p><div class="mission-hud"><div class="mission-chip">Pregunta ${state.currentIndex+1}/${state.pool.length}</div><div class="mission-chip">Recompensa: +10 pts</div><div class="mission-chip">Categoría activa</div></div></div><div><div class="answers-head"><h4>Elige tu respuesta</h4><span>1 opción correcta</span></div><div class="answers" id="answers"></div></div></div><div style="margin-top:18px"><button class="btn btn-ghost" id="btnSkip">Saltar</button></div></section>`;const answers=document.getElementById('answers');q.opciones.forEach((op,i)=>{const btn=document.createElement('button');btn.className='answer';btn.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span><span>${op}</span>`;btn.addEventListener('click',()=>answer(i));answers.appendChild(btn);});document.getElementById('btnSkip').addEventListener('click',nextQuestion);}
function answer(i){const q=currentQ();const correct=i===q.correcta;if(correct) state.score+=10;state.answered.push({categoria:q.categoria,correct});showFeedback(correct,q);}
function showFeedback(correct,q){setNav('Feedback',q.categoria);app.innerHTML=`<section class="screen"><div class="feedback card"><div class="feedback-visual"><div class="feedback-status ${correct?'ok':'ko'}"><div class="feedback-symbol">${correct?'✓':'✕'}</div><h3>${correct?'Respuesta perfecta':'Todavía no'}</h3><p>${correct?'Has identificado correctamente el concepto clave de esta pregunta.':'Fallo útil: el aprendizaje continúa con la explicación y la siguiente ronda.'}</p></div></div><div class="feedback-copy"><div class="eyebrow blue">Retroalimentación</div><h2>${correct?'¡Excelente acierto!':'Respuesta incorrecta'}</h2><p>${q.explicacion}</p><div style="display:flex;gap:10px;margin:18px 0;flex-wrap:wrap"><span class="pill">${correct?'+10 puntos':'+0 puntos'}</span><span class="pill">${q.nivel}</span><span class="pill">${q.categoria}</span></div><button class="btn btn-primary" id="btnNext">Siguiente pregunta</button></div></div></section>`;document.getElementById('btnNext').addEventListener('click',nextQuestion);}
function nextQuestion(){state.currentIndex+=1;if(state.currentIndex>=state.pool.length) showResults(); else showQuestion();}
function getLevel(acc){if(acc>=85) return 'Embajador biodiverso Airbus'; if(acc>=65) return 'Guardián de biodiversidad'; return 'Explorador básico';}
function getMessage(acc){if(acc>=85) return 'Has demostrado un alto nivel de comprensión sobre biodiversidad aplicada a entornos industriales.'; if(acc>=65) return 'Buen resultado. Ya manejas conceptos clave y puedes seguir profundizando.'; return 'Buen punto de partida. Repite el reto y consolida los conceptos esenciales.';}
function categoryPerformance(best){const groups={};state.answered.forEach(a=>{if(!groups[a.categoria]) groups[a.categoria]={total:0,ok:0};groups[a.categoria].total+=1;if(a.correct) groups[a.categoria].ok+=1;});const entries=Object.keys(groups).map(k=>[k,groups[k].total?groups[k].ok/groups[k].total:0]);if(!entries.length) return '—';entries.sort((a,b)=>best?b[1]-a[1]:a[1]-b[1]);return entries[0][0];}
function showResults(){const total=state.pool.length*10;const acc=total?Math.round((state.score/total)*100):0;setNav('Resultados','Knowledge Base');app.innerHTML=`<section class="screen"><div class="results card"><div><div class="eyebrow blue">Evaluación completada</div><h2 style="font-size:52px;margin:6px 0 8px;line-height:.96">Resultados finales</h2><div class="score">${state.score} pts</div><div class="level">${getLevel(acc)}</div><p>${getMessage(acc)}</p><div style="display:flex;gap:14px;margin-top:24px;flex-wrap:wrap"><button class="btn btn-primary" id="btnRestart">Volver a jugar</button><button class="btn btn-secondary" id="btnModes">Cambiar modo</button></div></div><div><div class="result-image"></div><div class="result-rank"><div class="rank-card"><strong>${state.pool.length}</strong><span>preguntas jugadas</span></div><div class="rank-card"><strong>${Math.round(state.score/10)}</strong><span>aciertos</span></div></div><div class="metric"><div class="metric-row"><span>% de aciertos</span><strong>${acc}%</strong></div><div class="metric-row"><span>Categoría más fuerte</span><strong>${categoryPerformance(true)}</strong></div><div class="metric-row"><span>Categoría a mejorar</span><strong>${categoryPerformance(false)}</strong></div></div></div></div></section>`;document.getElementById('btnRestart').addEventListener('click',showWelcome);document.getElementById('btnModes').addEventListener('click',showModes);}
showWelcome();
</script>
</body>
</html>
